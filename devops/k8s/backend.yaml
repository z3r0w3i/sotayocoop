apiVersion: apps/v1
kind: Deployment
metadata:
  name: sotayocoop-backend
  namespace: sotayocoop
  labels:
    app: sotayocoop-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sotayocoop-backend
  template:
    metadata:
      labels:
        app: sotayocoop-backend
    spec:
      containers:
        - name: backend
          image: registry.gitlab.com/gialai-agri/sotayocoop/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres_secure_password"
            - name: DB_NAME
              value: "sotayocoop"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: gemini-api-key
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/docs
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/docs
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: sotayocoop
spec:
  ports:
    - port: 3000
      targetPort: http
      name: http
  selector:
    app: sotayocoop-backend
  type: ClusterIP
