apiVersion: apps/v1
kind: Deployment
metadata:
  name: sotayocoop-frontend
  namespace: sotayocoop
  labels:
    app: sotayocoop-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sotayocoop-frontend
  template:
    metadata:
      labels:
        app: sotayocoop-frontend
    spec:
      containers:
        - name: frontend
          image: registry.gitlab.com/gialai-agri/sotayocoop/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://backend-service:3000/api"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: sotayocoop
spec:
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    app: sotayocoop-frontend
  type: ClusterIP
